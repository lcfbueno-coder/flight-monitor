name: Flight Monitor

on:
  schedule:
    - cron: '0 15 * * *'   # 12h BRT (15h UTC)
  workflow_dispatch:

permissions:
  contents: write           # necessário para commitar de volta ao repo

jobs:
  search:
    name: Buscar preços e publicar painel
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependências Python
        run: pip install -r requirements.txt

      - name: Instalar Chromium + dependências do sistema
        run: playwright install chromium --with-deps

      - name: Buscar preços
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OUTPUT_DIR:       public
        run: python search.py

      - name: Commitar dados atualizados
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data.json public/history.json
          git diff --staged --quiet || git commit -m "📊 Atualiza preços $(date -u +'%d/%m/%Y %H:%M UTC')"
          git push
